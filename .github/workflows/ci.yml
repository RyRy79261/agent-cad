name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (cad / slice / scan / api)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # pull the committed 3DBenchy STL (sample-model test loads it)

      # OCCT / build123d (OCP) need OpenGL system libs even for headless export.
      - name: Install OpenGL libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libegl1 libglx-mesa0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest -q

  js:
    name: JS (web / packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build · typecheck · test
        run: pnpm turbo run build typecheck test
